name: Docker Image Check

on:
  push:
    branches: [ development ]
  workflow_dispatch:

jobs:
    docker-check:
        runs-on: ubuntu-latest
        permissions:
          contents: read
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Docker hub
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}
            
            - name: Build Docker    
              run: docker build -t ${{ secrets.DOCKER_USERNAME }}/satc-devops:001 .